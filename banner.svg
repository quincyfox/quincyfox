<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#090412" />
            <stop offset="50%" stop-color="#140b2e" />
            <stop offset="100%" stop-color="#04101a" />
        </linearGradient>

        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3.5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <path id="orbitPath" d="M 150,100 C 150,30 650,30 650,100 C 650,170 150,170 150,100" />

        <g id="ship_sprite" transform="scale(1.5)">
            <path d="M-10,-5 h10v-5h5v5h10v5h-10v5h-5v-5h-10z" fill="#00ffcc" />
            <path d="M0,-2 h5v4h-5z" fill="#090412" />
            <path d="M-15,-2 h5v4h-5z" fill="#ff00ff">
                <animate attributeName="opacity" values="1;0.1;1" dur="0.1s" repeatCount="indefinite" />
                <animate attributeName="fill" values="#ff00ff;#ff40ff;#ff00ff" dur="0.05s" repeatCount="indefinite" />
            </path>
        </g>

        <path id="alien_shape" d="M-6,-6 h4v4h-4z M2,-6 h4v4h-4z M-10,-2 h20v4h-20z M-6,2 h12v4h-12z M-10,6 h4v4h-4z M6,6 h4v4h-4z" />
    </defs>

    <rect width="800" height="200" fill="url(#bg)" />

    <g fill="#ffffff">
        <rect x="50" y="50" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></rect>
        <rect x="750" y="150" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></rect>
        <rect x="120" y="180" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></rect>
        <rect x="680" y="30" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="4s" repeatCount="indefinite"/></rect>
        <rect x="400" y="180" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></rect>
        <rect x="300" y="20" width="2" height="2" fill="#ffffff"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></rect>
        <rect x="10" y="10" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="1s" repeatCount="indefinite" begin="0.1s"/></rect>
        <rect x="80" y="40" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="1.5s" repeatCount="indefinite" begin="0.2s"/></rect>
        <rect x="200" y="120" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/></rect>
        <rect x="350" y="60" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="2.5s" repeatCount="indefinite" begin="0.4s"/></rect>
        <rect x="450" y="160" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite" begin="0.5s"/></rect>
        <rect x="550" y="100" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="3.5s" repeatCount="indefinite" begin="0.6s"/></rect>
        <rect x="700" y="80" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite" begin="0.7s"/></rect>
        <rect x="790" y="190" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.5s" repeatCount="indefinite" begin="0.8s"/></rect>
        <rect x="150" y="30" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="5s" repeatCount="indefinite" begin="0.9s"/></rect>
        <rect x="620" y="140" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="5.5s" repeatCount="indefinite" begin="1s"/></rect>
        <rect x="20" y="190" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="6s" repeatCount="indefinite" begin="1.1s"/></rect>
        <rect x="420" y="20" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="6.5s" repeatCount="indefinite" begin="1.2s"/></rect>
        <rect x="180" y="160" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="7s" repeatCount="indefinite" begin="1.3s"/></rect>
        <rect x="650" y="60" width="1" height="1" fill="#ffffff"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="7.5s" repeatCount="indefinite" begin="1.4s"/></rect>
    </g>

    <g fill="#ff00ff" filter="url(#glow)">
        <circle cx="50" cy="180" r="1.5">
            <animate attributeName="cy" values="180;170;180" dur="5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
        </circle>
        <circle cx="200" cy="30" r="1.5">
            <animate attributeName="cy" values="30;40;30" dur="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
        </circle>
        <circle cx="350" cy="120" r="1.5">
            <animate attributeName="cy" values="120;110;120" dur="5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
        </circle>
        <circle cx="500" cy="80" r="1.5">
            <animate attributeName="cy" values="80;90;80" dur="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
        </circle>
        <circle cx="650" cy="160" r="1.5">
            <animate attributeName="cy" values="160;150;160" dur="5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" />
        </circle>
        <circle cx="780" cy="40" r="1.5">
            <animate attributeName="cy" values="40;50;40" dur="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="5s" repeatCount="indefinite" />
        </circle>
        </g>

    <g fill="#00ffcc" filter="url(#glow)">
        <circle cx="20" cy="100" r="2">
            <animate attributeName="cy" values="100;110;100" dur="7s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
        </circle>
        <circle cx="150" cy="190" r="2">
            <animate attributeName="cy" values="190;180;190" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" />
        </circle>
        <circle cx="280" cy="60" r="2">
            <animate attributeName="cy" values="60;70;60" dur="7s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
        </circle>
        <circle cx="430" cy="140" r="2">
            <animate attributeName="cy" values="140;130;140" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" />
        </circle>
        <circle cx="580" cy="20" r="2">
            <animate attributeName="cy" values="20;30;20" dur="7s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="6s" repeatCount="indefinite" />
        </circle>
        <circle cx="720" cy="120" r="2">
            <animate attributeName="cy" values="120;110;120" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="7s" repeatCount="indefinite" />
        </circle>
        </g>

    <use href="#orbitPath" fill="none" stroke="#8a2be2" stroke-width="1" stroke-dasharray="4,4" opacity="0.3" />

    <g transform="translate(400, 100)" text-anchor="middle" dominant-baseline="middle" font-family="'Courier New', Courier, monospace" font-weight="bold" font-size="64">
        <text x="-210" y="0" fill="#ff00ff" filter="url(#glow)">&lt;</text>
        <text x="0" y="0" fill="#ffffff" filter="url(#glow)">
            quincyfox
            <animate attributeName="fill" values="#ffffff; #e0ffff; #ffffff" dur="3s" repeatCount="indefinite" />
        </text>
        <text x="210" y="0" fill="#ff00ff" filter="url(#glow)">&gt;</text>
    </g>

    <g transform="translate(400, 45)">
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.2s" repeatCount="indefinite" />
            <use href="#alien_shape" fill="#ff00ff" transform="scale(1.5)" filter="url(#glow)">
                <animate attributeName="opacity" values="1; 1; 0; 0; 1" keyTimes="0; 0.2; 0.22; 0.9; 1" dur="5s" repeatCount="indefinite"/>
                <animate attributeName="fill" values="#ff00ff; #ffffff; #ff00ff" keyTimes="0; 0.2; 0.22" dur="5s" repeatCount="indefinite"/>
            </use>
            <circle cx="0" cy="0" r="5" fill="#ff00ff" opacity="0" filter="url(#glow)">
                <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.2; 0.22; 0.35; 1" dur="5s" repeatCount="indefinite"/>
            </circle>
        </g>
    </g>

    <g transform="translate(630, 100)">
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.3s" repeatCount="indefinite" />
            <use href="#alien_shape" fill="#00ffcc" transform="scale(1.5)" filter="url(#glow)">
                <animate attributeName="opacity" values="1; 1; 0; 0; 1" keyTimes="0; 0.45; 0.48; 0.9; 1" dur="5s" repeatCount="indefinite"/>
                <animate attributeName="fill" values="#00ffcc; #ffffff; #00ffcc" keyTimes="0; 0.45; 0.48" dur="5s" repeatCount="indefinite"/>
            </use>
            <circle cx="0" cy="0" r="5" fill="#00ffcc" opacity="0" filter="url(#glow)">
                <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.45; 0.48; 0.61; 1" dur="5s" repeatCount="indefinite"/>
            </circle>
        </g>
    </g>

    <g transform="translate(400, 155)">
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="1.1s" repeatCount="indefinite" />
            <use href="#alien_shape" fill="#ff00ff" transform="scale(1.5)" filter="url(#glow)">
                <animate attributeName="opacity" values="1; 1; 0; 0; 1" keyTimes="0; 0.7; 0.73; 0.9; 1" dur="5s" repeatCount="indefinite"/>
                <animate attributeName="fill" values="#ff00ff; #ffffff; #ff00ff" keyTimes="0; 0.7; 0.73" dur="5s" repeatCount="indefinite"/>
            </use>
            <circle cx="0" cy="0" r="5" fill="#ff00ff" opacity="0" filter="url(#glow)">
                <animate attributeName="opacity" values="0; 0; 1; 0; 0" keyTimes="0; 0.7; 0.73; 0.86; 1" dur="5s" repeatCount="indefinite"/>
            </circle>
        </g>
    </g>

    <g>
        <animateMotion dur="5s" repeatCount="indefinite" rotate="auto">
            <mpath href="#orbitPath" />
        </animateMotion>
        
        <use href="#ship_sprite" filter="url(#glow)"/>
        
        <g>
            <rect x="25" y="-2" width="15" height="4" fill="#ff00ff">
                <animate attributeName="x" values="25; 100" dur="0.4s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="1; 0" dur="0.4s" repeatCount="indefinite" />
            </rect>
            <circle cx="30" cy="0" r="2" fill="#ff00ff">
                <animate attributeName="cx" values="30; 100" dur="0.4s" repeatCount="indefinite" />
                <animate attributeName="cy" values="0;-5;5;0" dur="0.2s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.8; 0" dur="0.4s" repeatCount="indefinite" />
            </circle>
            <circle cx="35" cy="2" r="1.5" fill="#ff00ff">
                <animate attributeName="cx" values="35; 105" dur="0.4s" repeatCount="indefinite" />
                <animate attributeName="cy" values="2;7;-3;2" dur="0.3s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.8; 0" dur="0.4s" repeatCount="indefinite" />
            </circle>
        </g>
    </g>

</svg>
